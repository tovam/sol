name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned macOS app
    runs-on: macos-15
    timeout-minutes: 60

    env:
      CI: "true"
      RCT_NO_LAUNCH_PACKAGER: "1"
      SENTRY_DISABLE_AUTO_UPLOAD: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain and disk space
        run: |
          xcodebuild -version
          df -h /

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Ruby dependencies
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.8
          bundler-cache: true

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Create CI app configuration
        run: cp src/env.ci.ts src/env.ts

      - name: Verify React Native bundle
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/bundle-assets"
          bunx react-native bundle \
            --entry-file index.js \
            --platform macos \
            --dev false \
            --reset-cache \
            --bundle-output "$RUNNER_TEMP/main.jsbundle" \
            --assets-dest "$RUNNER_TEMP/bundle-assets" \
            2>&1 | tee "$RUNNER_TEMP/react-native-bundle.log"

          bundle_status=${PIPESTATUS[0]}
          if [ "$bundle_status" -ne 0 ]; then
            tail -n 30 "$RUNNER_TEMP/react-native-bundle.log" \
              | while IFS= read -r line; do
                  line=${line//'%'/'%25'}
                  line=${line//$'\r'/'%0D'}
                  line=${line//$'\n'/'%0A'}
                  echo "::error::$line"
                done
          fi

          exit "$bundle_status"

      - name: Install CocoaPods dependencies
        run: |
          cd macos
          bundle exec pod install

      - name: Check disk space after dependencies
        run: df -h /

      - name: Show resolved app build settings
        run: |
          xcodebuild \
            -workspace macos/sol.xcworkspace \
            -scheme release \
            -configuration Release \
            -showBuildSettings \
            | grep -E '^ *(HEADER_SEARCH_PATHS|OTHER_SWIFT_FLAGS|SWIFT_ENABLE_EXPLICIT_MODULES) =' \
            | while IFS= read -r line; do
                echo "::notice::$line"
              done

      - name: Build release app without Apple signing
        id: xcodebuild
        run: |
          set +e
          xcodebuild \
            -workspace macos/sol.xcworkspace \
            -scheme release \
            -configuration Release \
            -sdk macosx \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

          build_status=${PIPESTATUS[0]}
          if [ "$build_status" -ne 0 ]; then
            echo "### Xcode build errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            grep -E -i -B 4 -A 4 '(^|: )(fatal )?error:|\*\* BUILD FAILED \*\*|The following build commands failed' \
              "$RUNNER_TEMP/xcodebuild.log" \
              | tail -n 40 \
              | tee -a "$GITHUB_STEP_SUMMARY" \
              | head -n 10 \
              | while IFS= read -r line; do
                  line=${line//'%'/'%25'}
                  line=${line//$'\r'/'%0D'}
                  line=${line//$'\n'/'%0A'}
                  echo "::error::$line"
                done
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$build_status"

      - name: Upload Xcode build log on failure
        if: failure() && steps.xcodebuild.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: error
          retention-days: 7

      - name: Package application
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/sol.app"
          test -d "$APP_PATH"
          codesign --force --deep --sign - \
            --options runtime \
            --timestamp=none \
            --entitlements macos/sol-macOS/sol-ci.entitlements \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            Sol-macOS-unsigned.zip
          du -sh Sol-macOS-unsigned.zip
          df -h /

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Sol-macOS-unsigned
          path: Sol-macOS-unsigned.zip
          if-no-files-found: error
          retention-days: 7

  publish-development-release:
    name: Publish public development release
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download built application
        uses: actions/download-artifact@v4
        with:
          name: Sol-macOS-unsigned

      - name: Publish development release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: sol-development
        run: |
          test -f Sol-macOS-unsigned.zip
          sha256sum Sol-macOS-unsigned.zip > Sol-macOS-unsigned.zip.sha256

          printf '%s\n' \
            'Manually triggered unsigned macOS build from the `main` branch.' \
            '' \
            "Commit: \`${GITHUB_SHA}\`" \
            '' \
            'This development build is not notarized by Apple.' \
            > "$RUNNER_TEMP/release-notes.md"

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title 'Sol development build (unsigned)' \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease
            gh release upload "$RELEASE_TAG" \
              Sol-macOS-unsigned.zip \
              Sol-macOS-unsigned.zip.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              Sol-macOS-unsigned.zip \
              Sol-macOS-unsigned.zip.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title 'Sol development build (unsigned)' \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease \
              --latest=false
          fi

          printf 'Public download: https://github.com/%s/releases/download/%s/Sol-macOS-unsigned.zip\n' \
            "$GITHUB_REPOSITORY" \
            "$RELEASE_TAG" \
            >> "$GITHUB_STEP_SUMMARY"

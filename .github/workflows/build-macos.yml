name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: macos-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned macOS app
    runs-on: macos-15
    timeout-minutes: 60

    env:
      CI: "true"
      RCT_NO_LAUNCH_PACKAGER: "1"
      SENTRY_DISABLE_AUTO_UPLOAD: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain and disk space
        run: |
          xcodebuild -version
          df -h /

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Ruby dependencies
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.8
          bundler-cache: true

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install CocoaPods dependencies
        run: |
          cd macos
          bundle exec pod install

      - name: Check disk space after dependencies
        run: df -h /

      - name: Build release app without Apple signing
        id: xcodebuild
        run: |
          set +e
          xcodebuild \
            -workspace macos/sol.xcworkspace \
            -scheme release \
            -configuration Release \
            -sdk macosx \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            "HEADER_SEARCH_PATHS=\$(inherited) $GITHUB_WORKSPACE/macos/Pods/Headers/Public/yoga" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

          build_status=${PIPESTATUS[0]}
          if [ "$build_status" -ne 0 ]; then
            echo "### Xcode build errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            grep -E -i -B 4 -A 4 '(^|: )(fatal )?error:|\*\* BUILD FAILED \*\*|The following build commands failed' \
              "$RUNNER_TEMP/xcodebuild.log" \
              | tail -n 40 \
              | tee -a "$GITHUB_STEP_SUMMARY" \
              | head -n 10 \
              | while IFS= read -r line; do
                  line=${line//'%'/'%25'}
                  line=${line//$'\r'/'%0D'}
                  line=${line//$'\n'/'%0A'}
                  echo "::error::$line"
                done
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$build_status"

      - name: Upload Xcode build log on failure
        if: failure() && steps.xcodebuild.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: error
          retention-days: 7

      - name: Package application
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/sol.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            Sol-macOS-unsigned.zip
          du -sh Sol-macOS-unsigned.zip
          df -h /

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Sol-macOS-unsigned
          path: Sol-macOS-unsigned.zip
          if-no-files-found: error
          retention-days: 7

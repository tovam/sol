name: Republish existing macOS build

on:
  push:
    tags:
      - "sol-republish-*"

permissions:
  contents: read

concurrency:
  group: macos-republish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-development-release:
    name: Republish public development release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write

    steps:
      - name: Resolve source workflow run
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_reference="${GITHUB_REF_NAME#sol-republish-}"
          source_run_id="${source_reference%%-*}"
          if [[ -z "$source_run_id" || "$source_run_id" == *[!0-9]* ]]; then
            echo "::error::Tag must start with a numeric workflow run ID."
            exit 1
          fi

          retry_command() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [[ "$attempt" -lt 5 ]]; then
                echo "::warning::GitHub API attempt $attempt failed; retrying." >&2
                sleep "$((attempt * 3))"
              fi
            done
            return 1
          }

          source_sha="$(
            retry_command gh api "repos/$GITHUB_REPOSITORY/actions/runs/$source_run_id" \
              --jq '.head_sha'
          )"
          build_conclusion="$(
            retry_command gh api "repos/$GITHUB_REPOSITORY/actions/runs/$source_run_id/jobs" \
              --paginate \
              --jq '.jobs[] | select(.name == "Build unsigned macOS app") | .conclusion'
          )"

          if [[ ! "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Source workflow run returned an invalid commit SHA."
            exit 1
          fi

          if [[ "$build_conclusion" != "success" ]]; then
            echo "::error::Source build job is not successful: ${build_conclusion:-missing}"
            exit 1
          fi

          echo "run-id=$source_run_id" >> "$GITHUB_OUTPUT"
          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Download built application
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ steps.source.outputs.run-id }}
        run: |
          for attempt in 1 2 3 4 5; do
            rm -f Sol-macOS-unsigned.zip
            if gh run download "$SOURCE_RUN_ID" \
              --name Sol-macOS-unsigned \
              --repo "$GITHUB_REPOSITORY"; then
              exit 0
            fi
            if [[ "$attempt" -lt 5 ]]; then
              echo "::warning::Artifact download attempt $attempt failed; retrying."
              sleep "$((attempt * 5))"
            fi
          done

          echo "::error::Unable to download the built application after 5 attempts."
          exit 1

      - name: Publish development release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: sol-development
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          test -f Sol-macOS-unsigned.zip
          sha256sum Sol-macOS-unsigned.zip > Sol-macOS-unsigned.zip.sha256

          printf '%s\n' \
            'Explicitly triggered unsigned macOS development build.' \
            '' \
            "Commit: \`${SOURCE_SHA}\`" \
            '' \
            'This development build is not notarized by Apple.' \
            > "$RUNNER_TEMP/release-notes.md"

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title 'Sol development build (unsigned)' \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease
            gh release upload "$RELEASE_TAG" \
              Sol-macOS-unsigned.zip \
              Sol-macOS-unsigned.zip.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              Sol-macOS-unsigned.zip \
              Sol-macOS-unsigned.zip.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$SOURCE_SHA" \
              --title 'Sol development build (unsigned)' \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease \
              --latest=false
          fi

          printf 'Public download: https://github.com/%s/releases/download/%s/Sol-macOS-unsigned.zip\n' \
            "$GITHUB_REPOSITORY" \
            "$RELEASE_TAG" \
            >> "$GITHUB_STEP_SUMMARY"
